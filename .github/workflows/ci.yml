name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Validate control front-matter
        run: python -m tools.validate_controls
      - name: Run tests
        run: pytest -v
      - name: Build site (strict)
        run: mkdocs build --strict
